<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Active LLW Disposal Options in the United States</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-banner">
      <h1>
        The United States has only a small number of active LLW disposal options,
        and not all are available to every generator
      </h1>
    </header>

    <main class="map-shell" aria-label="Interactive LLW disposal facility map">
      <section class="map-panel">
        <div id="map" aria-label="Map of United States LLW disposal facilities"></div>

        <aside class="legend" aria-label="Map legend">
          <h2>Legend</h2>
          <div class="legend-row">
            <span class="legend-marker" aria-hidden="true"></span>
            <span>LLW disposal facility</span>
          </div>
          <div class="legend-row">
            <span class="legend-highlight" aria-hidden="true"></span>
            <span>States highlighted after marker click</span>
          </div>
        </aside>
      </section>

      <p id="selection-summary" class="selection-summary" aria-live="polite">
        Select a facility marker to see where it can accept waste.
      </p>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
  </body>
</html>
